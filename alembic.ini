# Alembic configuration file.
# The database URL is injected at runtime by app/db/env.py via get_settings().

[alembic]
script_location = app/db
prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden in env.py
sqlalchemy.url = postgresql://career:career@127.0.0.1:5433/career

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
