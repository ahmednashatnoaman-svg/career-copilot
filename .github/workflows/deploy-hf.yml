name: Deploy Backend → Hugging Face Spaces

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "app/**"
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".github/workflows/deploy-hf.yml"

concurrency:
  group: hf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend tests gate ─────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest (unit + smoke)
        run: uv run pytest -q
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ci-placeholder-not-used

  # ── Sync changed files to HF Space (triggers Docker rebuild) ──
  deploy:
    name: Sync to HF Spaces
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production-backend
      url: https://AhmedNashat1-career-copilot-api.hf.space

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.23"

      - name: Upload backend files to HF Space
        run: |
          python - <<'PYEOF'
          import os, subprocess
          from pathlib import Path
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          REPO_ID = "AhmedNashat1/career-copilot-api"
          SHA = os.environ["GITHUB_SHA"][:8]

          # Detect changed files vs previous commit
          try:
              result = subprocess.run(
                  ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
                  capture_output=True, text=True, check=True
              )
              changed = set(filter(None, result.stdout.strip().split("\n")))
          except Exception:
              changed = set()

          def is_backend(path: str) -> bool:
              p = Path(path)
              return p.parts[0] in ("app", "backend") or path in ("pyproject.toml", "uv.lock", "Dockerfile")

          to_upload = [f for f in changed if is_backend(f) and Path(f).is_file()]

          # Always ensure Dockerfile is synced (HF Space entrypoint)
          always_sync = [f for f in ("Dockerfile", "pyproject.toml", "uv.lock") if Path(f).is_file()]

          if to_upload:
              print(f"Uploading {len(to_upload)} changed file(s)…")
              for fpath in sorted(to_upload):
                  api.upload_file(
                      path_or_fileobj=fpath,
                      path_in_repo=fpath,
                      repo_id=REPO_ID,
                      repo_type="space",
                      commit_message=f"ci: sync {fpath} @ {SHA}",
                  )
                  print(f"  ✓ {fpath}")
          else:
              # First run or diff unavailable — full sync of app/
              print("Full sync: uploading app/ directory…")
              api.upload_folder(
                  folder_path="app",
                  path_in_repo="app",
                  repo_id=REPO_ID,
                  repo_type="space",
                  commit_message=f"ci: full sync @ {SHA}",
              )
              for f in always_sync:
                  api.upload_file(
                      path_or_fileobj=f,
                      path_in_repo=f,
                      repo_id=REPO_ID,
                      repo_type="space",
                      commit_message=f"ci: sync {f} @ {SHA}",
                  )
                  print(f"  ✓ {f}")

          print("\nHF Space rebuild triggered. Build typically takes 2–5 min.")
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Deployment summary
        run: |
          {
            echo "### Backend Deployment"
            echo ""
            echo "| Resource | URL |"
            echo "|---|---|"
            echo "| Space | https://huggingface.co/spaces/AhmedNashat1/career-copilot-api |"
            echo "| API root | https://AhmedNashat1-career-copilot-api.hf.space |"
            echo "| Health | https://AhmedNashat1-career-copilot-api.hf.space/health |"
            echo "| Swagger | https://AhmedNashat1-career-copilot-api.hf.space/docs |"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
