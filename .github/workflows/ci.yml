name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pytest (unit + smoke; integration auto-skips without INFRA_UP)
        run: uv run pytest -q
        env:
          # No real provider keys needed: provider tests use a fake key and assert
          # construction only; agent smoke tests stub the LLM. RAG/embedding tests
          # download the small fastembed model over the runner's network.
          LLM_PROVIDER: groq
          GROQ_API_KEY: ci-placeholder-not-used

  frontend:
    name: Test & Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Vitest
        run: cd frontend && npm test

      - name: Next.js build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build

  container-build:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        uses: redhat-actions/buildah-build@v2
        with:
          image: career-copilot-backend
          tags: latest
          containerfiles: |
            ./backend/Containerfile
          context: .

      - name: Build frontend image
        uses: redhat-actions/buildah-build@v2
        with:
          image: career-copilot-frontend
          tags: latest
          containerfiles: |
            ./frontend/Containerfile
          context: ./frontend
