name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + unit/smoke tests ───────────────────────────
  backend:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pytest (unit + smoke; integration auto-skips without INFRA_UP)
        run: uv run pytest -q
        env:
          # CI placeholders — tests stub the LLM; integration tests skip without real infra
          LLM_PROVIDER: groq
          GROQ_API_KEY: ci-placeholder-not-used

  # ── Next.js: vitest + production build ────────────────────────
  frontend:
    name: Test & Build (Next.js 15)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vitest
        run: npm test

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
          # Set API base so build-time references resolve (fallback: localhost:8000)
          NEXT_PUBLIC_API_BASE: https://AhmedNashat1-career-copilot-api.hf.space

  # ── Container image build validation (main only) ──────────────
  container-build:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Containerfile
          push: false
          tags: career-copilot-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Containerfile
          push: false
          tags: career-copilot-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key-for-ci-build
            NEXT_PUBLIC_API_BASE=https://AhmedNashat1-career-copilot-api.hf.space
