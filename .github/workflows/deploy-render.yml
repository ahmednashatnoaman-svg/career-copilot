name: Deploy Backend → Render

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - "render.yaml"
      - ".github/workflows/deploy-render.yml"

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Run backend tests first ────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ci-placeholder-not-used

  # ── Trigger Render deploy via deploy hook ──────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production-backend
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
        # RENDER_DEPLOY_HOOK_URL: set in GitHub Secrets
        # Get it from: Render Dashboard → Service → Settings → Deploy Hook

      - name: Wait for deployment to start
        run: sleep 10

      - name: Check deployment health
        run: |
          echo "Deployment triggered. Backend will be live at:"
          echo "${{ secrets.RENDER_BACKEND_URL }}/health"
          echo "Note: Free tier may take ~30s to spin up on first request."
