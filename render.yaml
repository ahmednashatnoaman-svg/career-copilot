services:
  # ── FastAPI Backend ────────────────────────────────────────────
  - type: web
    name: career-copilot-api
    runtime: docker
    dockerfilePath: ./backend/Containerfile
    dockerContext: .
    plan: free
    region: oregon
    autoDeploy: true          # deploys automatically on push to main

    healthCheckPath: /health

    envVars:
      # --- LLM ---
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_MODEL_FAST
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false           # set in Render dashboard
      - key: GOOGLE_API_KEY
        sync: false

      # --- Web search ---
      - key: TAVILY_API_KEY
        sync: false
      # --- Tracing (LangSmith — both new and legacy var names) ---
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_ENDPOINT
        value: https://api.smith.langchain.com
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: CareerFlow
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: CareerFlow
      # --- Datastores ---
      - key: DATABASE_URL
        sync: false           # Supabase Postgres connection string
      - key: QDRANT_URL
        sync: false           # Qdrant Cloud URL
      - key: QDRANT_API_KEY
        sync: false           # Qdrant Cloud API key (if needed)
      # --- Supabase Auth ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # --- Job sources ---
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      # --- CORS ---
      - key: FRONTEND_URL
        sync: false           # your Vercel URL e.g. https://career-copilot.vercel.app
