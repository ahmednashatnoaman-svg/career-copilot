services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
      POSTGRES_DB: career
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrantdata:/qdrant/storage"]
  backend:
    build:
      context: ..
      dockerfile: backend/Containerfile
    env_file: ../.env
    environment:
      DATABASE_URL: "postgresql://career:career@postgres:5432/career"
      QDRANT_URL: "http://qdrant:6333"
    ports: ["8000:8000"]
    depends_on: [postgres, qdrant]
volumes:
  pgdata:
  qdrantdata:
