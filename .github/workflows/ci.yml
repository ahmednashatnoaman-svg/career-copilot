name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pytest (unit + smoke; integration auto-skips without INFRA_UP)
        run: uv run pytest -q
        env:
          # No real provider keys needed: provider tests use a fake key and assert
          # construction only; agent smoke tests stub the LLM. RAG/embedding tests
          # download the small fastembed model over the runner's network.
          LLM_PROVIDER: groq
          GROQ_API_KEY: ci-placeholder-not-used
